<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="내가 원하는 가계부">
<meta name="theme-color" content="#FFF8EF">
<title>내가 원하는 가계부</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap');
  html, body { margin:0; padding:0; overscroll-behavior:none; }
  body { font-family:'Gowun Dodum', sans-serif; background:#FFF8EF; }
  .f-display { font-family:'Jua', sans-serif; }
  #app { height:100dvh; padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); }
  input, select { font-family:'Gowun Dodum', sans-serif; }
  ::-webkit-scrollbar { display:none; }
</style>
</head>
<body>
<div id="app" class="relative w-full overflow-hidden bg-[#FFF8EF] text-[#4A3F35] flex flex-col"></div>

<script>
/* ----------------------------- constants ----------------------------- */
const LS_PREFIX = "wonhaneun:";
const KEYS = { txns:"txns", recurring:"recurring", categories:"categories", settings:"settings" };

const DEFAULT_CATEGORIES = [
  { id:"food", type:"expense", name:"식비", emoji:"🍚", color:"#E2A85C" },
  { id:"cafe", type:"expense", name:"카페/간식", emoji:"☕", color:"#C98A6E" },
  { id:"transport", type:"expense", name:"교통", emoji:"🚌", color:"#7FA0C4" },
  { id:"shopping", type:"expense", name:"쇼핑", emoji:"🛍️", color:"#E093A9" },
  { id:"life", type:"expense", name:"생활용품", emoji:"🧺", color:"#93B87E" },
  { id:"health", type:"expense", name:"의료/건강", emoji:"💊", color:"#B39AD1" },
  { id:"culture", type:"expense", name:"문화/여가", emoji:"🎬", color:"#E8BE6E" },
  { id:"event", type:"expense", name:"경조사", emoji:"💌", color:"#D9846E" },
  { id:"sub", type:"expense", name:"구독료", emoji:"📺", color:"#8E8FC7" },
  { id:"etc_exp", type:"expense", name:"기타", emoji:"📎", color:"#ADA296" },
  { id:"salary", type:"income", name:"월급", emoji:"💰", color:"#6E9E71" },
  { id:"allowance", type:"income", name:"용돈", emoji:"🎁", color:"#D9B45E" },
  { id:"side", type:"income", name:"부수입", emoji:"✨", color:"#7FA0C4" },
  { id:"etc_inc", type:"income", name:"기타수입", emoji:"📎", color:"#ADA296" },
];

const THEME_PRESETS = [
  { id:"cocoa", name:"코코아", accent:"#C98A6E", accentSoft:"#F1D9CC" },
  { id:"sage", name:"세이지", accent:"#7FA07F", accentSoft:"#DCE8D8" },
  { id:"lavender", name:"라벤더", accent:"#9B8FC7", accentSoft:"#E4DFF3" },
  { id:"coral", name:"산호", accent:"#E0836E", accentSoft:"#F6DCD3" },
  { id:"sky", name:"하늘", accent:"#6E93B8", accentSoft:"#D9E5EF" },
];

const EMOJI_CHOICES = ["🍚","☕","🚌","🛍️","🧺","💊","🎬","💌","📺","📎","💰","🎁","✨","🍔","🍕","🍰","🍺","🚗","⛽","🏠","💡","📱","💻","👶","🐶","🐱","📚","✈️","🎮","💅","👕","🎵","🏋️","🌱","🎂","💳","🧾","⭐"];
const WEEKDAY_KR = ["일","월","화","수","목","금","토"];

/* ------------------------------ helpers ------------------------------ */
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
const pad2 = n => String(n).padStart(2,"0");
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; };
const currentMonthKey = () => { const d=new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; };
const daysInMonth = mk => { const [y,m]=mk.split("-").map(Number); return new Date(y,m,0).getDate(); };
const addMonths = (mk,delta) => { const [y,m]=mk.split("-").map(Number); const d=new Date(y,m-1+delta,1); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; };
const monthLabel = mk => { const [y,m]=mk.split("-").map(Number); return `${y}년 ${m}월`; };
const weekdayOf = ds => WEEKDAY_KR[new Date(ds+"T00:00:00").getDay()];
const dayOf = ds => Number(ds.split("-")[2]);
const formatWon = n => `${Math.round(n).toLocaleString("ko-KR")}원`;
const esc = s => (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ------------------------------ storage ------------------------------ */
function loadLS(key, fallback){
  try { const raw = localStorage.getItem(LS_PREFIX+key); return raw ? JSON.parse(raw) : fallback; }
  catch(e){ return fallback; }
}
function saveLS(key, value){
  try { localStorage.setItem(LS_PREFIX+key, JSON.stringify(value)); }
  catch(e){ console.error("저장 실패", key, e); }
}

/* ------------------------------- state -------------------------------- */
const state = {
  txns: loadLS(KEYS.txns, []),
  recurring: loadLS(KEYS.recurring, []),
  categories: loadLS(KEYS.categories, DEFAULT_CATEGORIES),
  settings: loadLS(KEYS.settings, { themeId:"cocoa" }),
  monthKey: currentMonthKey(),
  tab: "feed",
  view: "main", // main | add
  draft: null,
};
if (!state.categories || !state.categories.length) state.categories = DEFAULT_CATEGORIES;

function persist(){
  saveLS(KEYS.txns, state.txns);
  saveLS(KEYS.recurring, state.recurring);
  saveLS(KEYS.categories, state.categories);
  saveLS(KEYS.settings, state.settings);
}

function theme(){ return THEME_PRESETS.find(t=>t.id===state.settings.themeId) || THEME_PRESETS[0]; }
function getCategory(id){ return state.categories.find(c=>c.id===id) || { id, type:"expense", name:"삭제된 카테고리", emoji:"❔", color:"#B8AFA6" }; }

/* --------------------------- derived getters --------------------------- */
function monthActual(mk){ return state.txns.filter(t=>t.date.startsWith(mk)); }
function monthProjected(mk){
  const actual = monthActual(mk);
  const dim = daysInMonth(mk);
  return state.recurring
    .filter(r => mk >= r.startMonth)
    .filter(r => !actual.some(t => t.recurringId === r.id))
    .map(r => {
      const day = Math.min(r.dayOfMonth, dim);
      return { id:`proj-${r.id}-${mk}`, projected:true, recurringId:r.id, type:r.type, amount:r.amount, categoryId:r.categoryId, memo:r.memo, date:`${mk}-${pad2(day)}` };
    });
}
function feedItems(mk){ return [...monthActual(mk), ...monthProjected(mk)].sort((a,b)=>a.date.localeCompare(b.date)); }
function groupedByDay(mk){
  const map = {};
  feedItems(mk).forEach(item => (map[item.date] = map[item.date] || []).push(item));
  return Object.entries(map).sort(([a],[b])=>a.localeCompare(b));
}
function monthSummary(mk){
  let incomeActual=0, expenseActual=0, incomeProj=0, expenseProj=0;
  monthActual(mk).forEach(t => t.type==="income" ? incomeActual+=t.amount : expenseActual+=t.amount);
  monthProjected(mk).forEach(t => t.type==="income" ? incomeProj+=t.amount : expenseProj+=t.amount);
  return { incomeActual, expenseActual, incomeProj, expenseProj };
}

/* -------------------------------- render ------------------------------- */
let chartPie=null, chartBar=null;

function render(){
  const t = theme();
  const app = document.getElementById("app");
  app.style.setProperty("--accent", t.accent);
  app.style.setProperty("--accent-soft", t.accentSoft);

  if (state.view === "add" && state.draft) {
    app.innerHTML = renderAddPage(state.draft, t);
    bindAddPageEvents();
    return;
  }

  app.innerHTML = `
    <header class="shrink-0 z-20 bg-[#FFF8EF] px-4 pt-4 pb-2 border-b border-[#EFE3D3]">
      <div class="flex items-center justify-between">
        <h1 class="f-display text-2xl text-[#4A3F35] flex items-center gap-1">내가 원하는 가계부 <span style="color:${t.accent}">✨</span></h1>
        <button id="btn-settings" class="w-9 h-9 rounded-full bg-white shadow-sm flex items-center justify-center active:scale-95 transition">⚙️</button>
      </div>
    </header>
    <main id="main-scroll" class="relative flex-1 min-h-0 overflow-y-auto pb-24"></main>
    <button id="btn-fab" class="absolute bottom-24 right-5 w-14 h-14 rounded-full shadow-lg flex items-center justify-center active:scale-90 transition z-30 text-white text-2xl" style="background:${t.accent}; ${state.tab!=='feed' ? 'display:none;' : ''}">+</button>
    <nav class="absolute bottom-0 left-0 right-0 shrink-0 bg-white border-t border-[#EFE3D3] flex z-20">
      ${tabButton("feed","📅","피드",t)}
      ${tabButton("stats","🥧","통계",t)}
      ${tabButton("recurring","🔁","반복지출",t)}
      ${tabButton("settings","⚙️","설정",t)}
    </nav>
  `;

  document.getElementById("btn-settings").onclick = () => { state.tab="settings"; render(); };
  document.getElementById("btn-fab").onclick = () => openAddModal(null);
  document.querySelectorAll("[data-tab]").forEach(el => el.onclick = () => { state.tab = el.getAttribute("data-tab"); render(); });

  const main = document.getElementById("main-scroll");
  if (state.tab==="feed") { main.innerHTML = renderFeed(t); bindFeedEvents(); }
  else if (state.tab==="stats") { main.innerHTML = renderStats(t); bindStatsEvents(t); }
  else if (state.tab==="recurring") { main.innerHTML = renderRecurring(t); bindRecurringEvents(); }
  else if (state.tab==="settings") { main.innerHTML = renderSettings(t); bindSettingsEvents(); }
}

function tabButton(id, icon, label, t){
  const active = state.tab===id;
  return `<button data-tab="${id}" class="flex-1 flex flex-col items-center justify-center gap-0.5 py-2.5 active:scale-95 transition" style="color:${active ? t.accent : '#B3A99C'}">
    <span style="font-size:20px">${icon}</span><span style="font-size:11px">${label}</span>
  </button>`;
}

function monthSwitcherHTML(t){
  return `<div class="flex items-center justify-center gap-4 py-3">
    <button id="btn-prev-month" class="w-8 h-8 flex items-center justify-center active:scale-90 text-[#9C8F82]">‹</button>
    <span class="f-display text-lg" style="color:${t.accent}">${monthLabel(state.monthKey)}</span>
    <button id="btn-next-month" class="w-8 h-8 flex items-center justify-center active:scale-90 text-[#9C8F82]">›</button>
  </div>`;
}
function bindMonthSwitcher(onChange){
  document.getElementById("btn-prev-month").onclick = () => { state.monthKey = addMonths(state.monthKey,-1); onChange(); };
  document.getElementById("btn-next-month").onclick = () => { state.monthKey = addMonths(state.monthKey,1); onChange(); };
}

/* -------------------------------- feed -------------------------------- */
function renderFeed(t){
  const mk = state.monthKey;
  const summary = monthSummary(mk);
  const balance = summary.incomeActual - summary.expenseActual;
  const hasFuture = summary.incomeProj + summary.expenseProj > 0;
  const groups = groupedByDay(mk);

  return `
    <div class="px-4">
      ${monthSwitcherHTML(t)}
      <div class="grid grid-cols-3 gap-2 mb-4">
        ${summaryCard("수입", summary.incomeActual, "#6E9E71")}
        ${summaryCard("지출", summary.expenseActual, "#D9846E")}
        ${summaryCard("잔액", balance, t.accent)}
      </div>
      ${hasFuture ? `<div class="rounded-xl border border-dashed border-[#D8CBB8] bg-[#FBF6EE] px-3 py-2 mb-4 text-[12px] text-[#9C8F82] flex items-center gap-1.5">
        🔁 예정된 반복지출 ${summary.expenseProj>0?`지출 ${formatWon(summary.expenseProj)}`:""}${summary.incomeProj>0?`, 수입 ${formatWon(summary.incomeProj)}`:""} 이 이 달에 반영돼요
      </div>` : ""}
      ${groups.length===0 ? `<div class="text-center text-[#B3A99C] text-sm py-16">아직 기록이 없어요.<br>오른쪽 아래 + 버튼으로 추가해보세요 🌱</div>` : ""}
      <div class="space-y-4">
        ${groups.map(([date, items]) => `
          <div>
            <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-r-full rounded-tl-full text-[12px] text-white shadow-sm" style="background:${t.accent}; transform:rotate(-0.5deg)">
              <span class="f-display">${dayOf(date)}일</span><span style="opacity:.8">(${weekdayOf(date)})</span>
            </div>
            <div class="space-y-2 mt-1.5">
              ${items.map(item => txnRowHTML(item)).join("")}
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}
function summaryCard(label, value, color){
  const text = value>=0 ? formatWon(value) : `-${formatWon(Math.abs(value))}`;
  return `<div class="rounded-2xl bg-white shadow-sm px-2 py-3 text-center">
    <div class="text-[11px] text-[#B3A99C] mb-0.5">${label}</div>
    <div class="f-display text-[13px]" style="color:${color}">${text}</div>
  </div>`;
}
function txnRowHTML(item){
  const cat = getCategory(item.categoryId);
  const isIncome = item.type==="income";
  return `<button data-open-item="${item.id}" class="w-full flex items-center gap-3 rounded-xl bg-white px-3 py-2.5 shadow-sm active:scale-[0.99] transition text-left ${item.projected ? "border border-dashed border-[#D8CBB8] opacity-80" : ""}">
    <div class="w-9 h-9 rounded-full flex items-center justify-center text-base shrink-0" style="background:${cat.color}26">${cat.emoji}</div>
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-1.5">
        <span class="text-[13px] text-[#4A3F35]">${esc(cat.name)}</span>
        ${item.projected ? `<span class="text-[10px] px-1.5 py-0.5 rounded-full bg-[#F1EAE0] text-[#9C8F82]">예정</span>` : ""}
      </div>
      ${item.memo ? `<div class="text-[11px] text-[#B3A99C] truncate">${esc(item.memo)}</div>` : ""}
    </div>
    <div class="text-[13px] f-display shrink-0" style="color:${isIncome ? '#6E9E71' : '#D9846E'}">${isIncome?"+":"-"}${formatWon(item.amount)}</div>
  </button>`;
}
function bindFeedEvents(){
  bindMonthSwitcher(() => { document.getElementById("main-scroll").innerHTML = renderFeed(theme()); bindFeedEvents(); });
  document.querySelectorAll("[data-open-item]").forEach(el => {
    el.onclick = () => {
      const id = el.getAttribute("data-open-item");
      const items = feedItems(state.monthKey);
      const item = items.find(i => i.id === id);
      if (!item) return;
      if (item.projected) openConfirmProjection(item);
      else openEditActual(item);
    };
  });
}

/* -------------------------------- stats -------------------------------- */
function renderStats(t){
  return `
    <div class="px-4">
      ${monthSwitcherHTML(t)}
      <div class="rounded-2xl bg-white shadow-sm p-4 mb-4">
        <div class="f-display text-sm mb-2 text-[#4A3F35]">카테고리별 지출 (예정 포함)</div>
        <div id="pie-wrap" style="height:190px"><canvas id="pieCanvas"></canvas></div>
        <div id="pie-legend" class="grid grid-cols-2 gap-x-3 gap-y-1.5 mt-2"></div>
      </div>
      <div class="rounded-2xl bg-white shadow-sm p-4 mb-6">
        <div class="f-display text-sm mb-2 text-[#4A3F35]">최근 6개월 흐름</div>
        <div style="height:190px"><canvas id="barCanvas"></canvas></div>
      </div>
    </div>
  `;
}
function bindStatsEvents(t){
  bindMonthSwitcher(() => { document.getElementById("main-scroll").innerHTML = renderStats(theme()); bindStatsEvents(theme()); });

  const items = feedItems(state.monthKey).filter(i=>i.type==="expense");
  const map = {};
  items.forEach(i => map[i.categoryId] = (map[i.categoryId]||0) + i.amount);
  const entries = Object.entries(map).map(([cid,val]) => ({ name:getCategory(cid).name, value:val, color:getCategory(cid).color })).sort((a,b)=>b.value-a.value);
  const total = entries.reduce((s,e)=>s+e.value,0);

  if (chartPie) { chartPie.destroy(); chartPie=null; }
  const pieCanvas = document.getElementById("pieCanvas");
  if (total === 0) {
    document.getElementById("pie-wrap").innerHTML = `<div class="text-center text-[#B3A99C] text-xs py-16">이 달의 지출 기록이 없어요</div>`;
  } else {
    chartPie = new Chart(pieCanvas, {
      type: "doughnut",
      data: { labels: entries.map(e=>e.name), datasets:[{ data: entries.map(e=>e.value), backgroundColor: entries.map(e=>e.color), borderWidth:2, borderColor:"#fff" }] },
      options: { plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ label: ctx => formatWon(ctx.parsed) } } }, cutout:"55%", maintainAspectRatio:false }
    });
    document.getElementById("pie-legend").innerHTML = entries.map(e => `
      <div class="flex items-center gap-1.5 text-[11px] text-[#4A3F35]">
        <span class="w-2.5 h-2.5 rounded-full shrink-0" style="background:${e.color}"></span>
        <span class="truncate flex-1">${esc(e.name)}</span>
        <span class="text-[#9C8F82]">${Math.round((e.value/total)*100)}%</span>
      </div>`).join("");
  }

  const months = []; for (let i=5;i>=0;i--) months.push(addMonths(state.monthKey,-i));
  const trend = months.map(mk => {
    const its = state.txns.filter(x=>x.date.startsWith(mk));
    const income = its.filter(x=>x.type==="income").reduce((s,x)=>s+x.amount,0);
    const expense = its.filter(x=>x.type==="expense").reduce((s,x)=>s+x.amount,0);
    return { month: mk.slice(5), income, expense };
  });
  if (chartBar) { chartBar.destroy(); chartBar=null; }
  chartBar = new Chart(document.getElementById("barCanvas"), {
    type:"bar",
    data:{ labels: trend.map(x=>x.month), datasets:[
      { label:"수입", data: trend.map(x=>x.income), backgroundColor:"#7FA07F", borderRadius:6 },
      { label:"지출", data: trend.map(x=>x.expense), backgroundColor:"#D9846E", borderRadius:6 },
    ]},
    options:{ maintainAspectRatio:false, plugins:{ legend:{ labels:{ font:{ size:11 } } }, tooltip:{ callbacks:{ label: ctx => `${ctx.dataset.label}: ${formatWon(ctx.parsed.y)}` } } },
      scales:{ x:{ grid:{ color:"#EFE3D3" }, ticks:{ font:{ size:11 }, color:"#9C8F82" } }, y:{ grid:{ color:"#EFE3D3" }, ticks:{ font:{ size:10 }, color:"#9C8F82" } } } }
  });
}

/* ------------------------------ recurring ------------------------------ */
function renderRecurring(t){
  if (!state.recurring.length) {
    return `<div class="px-4 pt-4">
      <div class="text-[12px] text-[#9C8F82] mb-3 px-1">등록된 반복지출/수입이에요. 매달 자동으로 예정 내역이 생성돼요.</div>
      <div class="text-center text-[#B3A99C] text-sm py-16">아직 등록된 반복 항목이 없어요.<br>내역 추가할 때 '매달 반복' 체크박스를 켜보세요 🔁</div>
    </div>`;
  }
  return `<div class="px-4 pt-4">
    <div class="text-[12px] text-[#9C8F82] mb-3 px-1">등록된 반복지출/수입이에요. 매달 자동으로 예정 내역이 생성돼요.</div>
    <div class="space-y-2">
      ${state.recurring.map(r => {
        const cat = getCategory(r.categoryId);
        const isIncome = r.type==="income";
        return `<div class="flex items-center gap-3 rounded-xl bg-white px-3 py-3 shadow-sm">
          <div class="w-9 h-9 rounded-full flex items-center justify-center text-base shrink-0" style="background:${cat.color}26">${cat.emoji}</div>
          <div class="flex-1 min-w-0">
            <div class="text-[13px] text-[#4A3F35]">${esc(cat.name)}${r.memo?` · ${esc(r.memo)}`:""}</div>
            <div class="text-[11px] text-[#B3A99C]">매달 ${r.dayOfMonth}일</div>
          </div>
          <div class="text-[13px] f-display" style="color:${isIncome?'#6E9E71':'#D9846E'}">${isIncome?"+":"-"}${formatWon(r.amount)}</div>
          <button data-del-recurring="${r.id}" class="w-7 h-7 rounded-full flex items-center justify-center active:scale-90 text-[#C9A2A2]">🗑</button>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}
function bindRecurringEvents(){
  document.querySelectorAll("[data-del-recurring]").forEach(el => {
    el.onclick = () => {
      const id = el.getAttribute("data-del-recurring");
      state.recurring = state.recurring.filter(r=>r.id!==id);
      persist();
      document.getElementById("main-scroll").innerHTML = renderRecurring(theme());
      bindRecurringEvents();
    };
  });
}

/* ------------------------------- settings ------------------------------- */
let newCatType = "expense", newCatEmoji = "⭐";
function renderSettings(t){
  return `<div class="px-4 pt-4 space-y-6 pb-4">
    <section>
      <div class="f-display text-sm mb-2 text-[#4A3F35]">테마 색상</div>
      <div class="flex gap-2 flex-wrap">
        ${THEME_PRESETS.map(p => `
          <button data-theme="${p.id}" class="flex flex-col items-center gap-1 px-2 py-2 rounded-xl" style="background:${state.settings.themeId===p.id ? p.accentSoft : 'transparent'}">
            <span class="w-8 h-8 rounded-full shadow-sm" style="background:${p.accent}; display:inline-block"></span>
            <span class="text-[10px] text-[#9C8F82]">${p.name}</span>
          </button>`).join("")}
      </div>
    </section>
    <section>
      <div class="f-display text-sm mb-2 text-[#4A3F35]">카테고리 관리</div>
      <div class="grid grid-cols-2 gap-2 mb-3">
        ${state.categories.map(c => `
          <div class="flex items-center gap-2 rounded-lg bg-white px-2 py-1.5 shadow-sm">
            <span>${c.emoji}</span><span class="text-[12px] flex-1 truncate">${esc(c.name)}</span>
            <span class="text-[10px] text-[#B3A99C]">${c.type==="income"?"수입":"지출"}</span>
            <button data-del-cat="${c.id}" class="active:scale-90 text-[#C9A2A2]">✕</button>
          </div>`).join("")}
      </div>
      <div class="rounded-xl bg-white shadow-sm p-3">
        <div class="text-[12px] text-[#9C8F82] mb-2">새 카테고리 추가</div>
        <div class="flex gap-2 mb-2">
          <button id="newcat-expense" class="flex-1 py-1.5 rounded-lg text-[12px]" style="background:${newCatType==='expense'?t.accentSoft:'#F5F1EA'}; color:${newCatType==='expense'?t.accent:'#B3A99C'}">지출</button>
          <button id="newcat-income" class="flex-1 py-1.5 rounded-lg text-[12px]" style="background:${newCatType==='income'?t.accentSoft:'#F5F1EA'}; color:${newCatType==='income'?t.accent:'#B3A99C'}">수입</button>
        </div>
        <input id="newcat-name" placeholder="카테고리 이름" class="w-full rounded-lg border border-[#EFE3D3] px-2.5 py-1.5 text-[12px] mb-2 outline-none">
        <div class="flex flex-wrap gap-1 mb-2" style="max-height:80px; overflow-y:auto">
          ${EMOJI_CHOICES.map(e => `<button data-emoji="${e}" class="w-7 h-7 rounded-md flex items-center justify-center text-sm" style="background:${newCatEmoji===e?t.accentSoft:'transparent'}">${e}</button>`).join("")}
        </div>
        <button id="btn-add-cat" class="w-full py-1.5 rounded-lg text-white text-[12px]" style="background:${t.accent}">추가하기</button>
      </div>
    </section>
    <section class="text-[11px] text-[#B3A99C] leading-relaxed">
      독립형 버전이에요. 데이터는 이 기기의 브라우저(홈 화면 아이콘 포함)에만 저장돼요. 다른 기기와는 동기화되지 않으니, 기기를 바꾸면 이전 기록이 안 보일 수 있어요.
    </section>
  </div>`;
}
function bindSettingsEvents(){
  document.querySelectorAll("[data-theme]").forEach(el => {
    el.onclick = () => { state.settings.themeId = el.getAttribute("data-theme"); persist(); render(); };
  });
  document.querySelectorAll("[data-del-cat]").forEach(el => {
    el.onclick = () => {
      state.categories = state.categories.filter(c=>c.id!==el.getAttribute("data-del-cat"));
      persist();
      document.getElementById("main-scroll").innerHTML = renderSettings(theme());
      bindSettingsEvents();
    };
  });
  const nameInput = document.getElementById("newcat-name");
  document.getElementById("newcat-expense").onclick = () => { newCatType="expense"; document.getElementById("main-scroll").innerHTML = renderSettings(theme()); bindSettingsEvents(); };
  document.getElementById("newcat-income").onclick = () => { newCatType="income"; document.getElementById("main-scroll").innerHTML = renderSettings(theme()); bindSettingsEvents(); };
  document.querySelectorAll("[data-emoji]").forEach(el => {
    el.onclick = () => { newCatEmoji = el.getAttribute("data-emoji"); document.getElementById("main-scroll").innerHTML = renderSettings(theme()); bindSettingsEvents(); };
  });
  document.getElementById("btn-add-cat").onclick = () => {
    const name = nameInput.value.trim();
    if (!name) return;
    state.categories.push({ id:uid(), type:newCatType, name, emoji:newCatEmoji, color:theme().accent });
    persist();
    document.getElementById("main-scroll").innerHTML = renderSettings(theme());
    bindSettingsEvents();
  };
}

/* ---------------------------- add/edit page ---------------------------- */
function openAddModal(prefill){
  state.draft = prefill || {
    id:null, type:"expense", amount:"",
    categoryId: state.categories.find(c=>c.type==="expense")?.id || "",
    date: state.monthKey===currentMonthKey() ? todayStr() : `${state.monthKey}-01`,
    memo:"", makeRecurring:false, recurringId:null, confirmingProjection:false,
  };
  state.view = "add";
  render();
}
function openConfirmProjection(item){
  state.draft = { id:null, type:item.type, amount:item.amount, categoryId:item.categoryId, date:item.date, memo:item.memo, makeRecurring:false, recurringId:item.recurringId, confirmingProjection:true };
  state.view = "add";
  render();
}
function openEditActual(tItem){
  state.draft = { id:tItem.id, type:tItem.type, amount:tItem.amount, categoryId:tItem.categoryId, date:tItem.date, memo:tItem.memo||"", makeRecurring:false, recurringId:tItem.recurringId||null, confirmingProjection:false };
  state.view = "add";
  render();
}
function closeAddModal(){ state.view="main"; state.draft=null; render(); }

function saveDraft(){
  const d = state.draft;
  const amount = Number(d.amount);
  if (!amount || amount<=0 || !d.categoryId || !d.date) return;

  if (d.id) {
    state.txns = state.txns.map(t => t.id===d.id ? { ...t, type:d.type, amount, categoryId:d.categoryId, date:d.date, memo:d.memo } : t);
  } else {
    const newTxn = { id:uid(), type:d.type, amount, categoryId:d.categoryId, date:d.date, memo:d.memo, recurringId:d.recurringId||null };
    if (d.makeRecurring && !d.recurringId) {
      const ruleId = uid();
      newTxn.recurringId = ruleId;
      state.recurring.push({ id:ruleId, type:d.type, amount, categoryId:d.categoryId, memo:d.memo, dayOfMonth:dayOf(d.date), startMonth:d.date.slice(0,7) });
    }
    state.txns.push(newTxn);
  }
  persist();
  closeAddModal();
}
function deleteDraftTxn(){
  if (state.draft.id) state.txns = state.txns.filter(t=>t.id!==state.draft.id);
  persist();
  closeAddModal();
}

function renderAddPage(d, t){
  const filteredCats = state.categories.filter(c => c.type===d.type);
  return `
    <div class="shrink-0 flex items-center justify-between px-4 pt-4 pb-3 border-b border-[#EFE3D3] bg-[#FFF8EF]">
      <button id="btn-close-add" class="w-8 h-8 flex items-center justify-center active:scale-90 -ml-1 text-[#9C8F82] text-lg">✕</button>
      <div class="f-display text-base text-[#4A3F35]">${d.confirmingProjection ? "예정 내역 기록하기" : d.id ? "내역 수정" : "내역 추가"}</div>
      <div class="w-8"></div>
    </div>
    <div class="flex-1 min-h-0 overflow-y-auto px-4 pt-4">
      <div class="flex gap-2 mb-3">
        <button id="type-expense" class="flex-1 py-2 rounded-xl text-sm" style="background:${d.type==='expense'?t.accentSoft:'#FFFFFF'}; color:${d.type==='expense'?t.accent:'#B3A99C'}">지출</button>
        <button id="type-income" class="flex-1 py-2 rounded-xl text-sm" style="background:${d.type==='income'?t.accentSoft:'#FFFFFF'}; color:${d.type==='income'?t.accent:'#B3A99C'}">수입</button>
      </div>
      <div class="mb-3">
        <label class="text-[11px] text-[#9C8F82] block mb-1">금액</label>
        <input id="field-amount" type="number" inputmode="numeric" value="${d.amount}" placeholder="0" class="w-full rounded-xl border border-[#EFE3D3] bg-white px-3 py-2.5 text-lg f-display outline-none">
      </div>
      <div class="mb-3">
        <label class="text-[11px] text-[#9C8F82] block mb-1">카테고리</label>
        <div id="cat-picker" class="flex flex-wrap gap-1.5">
          ${filteredCats.map(c => `<button data-cat="${c.id}" class="flex items-center gap-1 px-2.5 py-1.5 rounded-full text-[12px]" style="background:${d.categoryId===c.id ? c.color+'33' : '#FFFFFF'}; border:${d.categoryId===c.id ? `1.5px solid ${c.color}` : '1px solid #EFE3D3'}"><span>${c.emoji}</span><span>${esc(c.name)}</span></button>`).join("")}
        </div>
      </div>
      <div class="mb-3">
        <label class="text-[11px] text-[#9C8F82] block mb-1">날짜</label>
        <input id="field-date" type="date" value="${d.date}" class="w-full rounded-xl border border-[#EFE3D3] bg-white px-3 py-2 text-sm outline-none">
      </div>
      <div class="mb-3">
        <label class="text-[11px] text-[#9C8F82] block mb-1">메모 (선택)</label>
        <input id="field-memo" value="${esc(d.memo)}" placeholder="예: 넷플릭스 구독" class="w-full rounded-xl border border-[#EFE3D3] bg-white px-3 py-2 text-sm outline-none">
      </div>
      ${(!d.id && !d.confirmingProjection) ? `
        <button id="btn-toggle-recurring" class="w-full flex items-center gap-2 rounded-xl bg-white px-3 py-2.5 mb-4 text-sm">
          <span class="w-5 h-5 rounded-md flex items-center justify-center shrink-0 text-white" style="background:${d.makeRecurring ? t.accent : '#F0EAE0'}">${d.makeRecurring ? "✓" : ""}</span>
          <span>🔁</span><span class="text-[#4A3F35]">매달 반복 (다음 달부터 자동 예정 표시)</span>
        </button>` : ""}
      ${d.confirmingProjection ? `<div class="text-[11px] text-[#9C8F82] mb-4 flex items-center gap-1">🔁 반복지출 예정 내역을 실제 내역으로 기록해요.</div>` : ""}
    </div>
    <div class="shrink-0 flex gap-2 px-4 py-3 border-t border-[#EFE3D3] bg-[#FFF8EF]">
      ${d.id ? `<button id="btn-delete-draft" class="px-4 py-3 rounded-xl bg-white text-[#C9A2A2]">🗑</button>` : ""}
      <button id="btn-save-draft" class="flex-1 py-3 rounded-xl text-white f-display" style="background:${t.accent}">저장</button>
    </div>
  `;
}
function bindAddPageEvents(){
  const t = theme();
  document.getElementById("btn-close-add").onclick = closeAddModal;
  document.getElementById("type-expense").onclick = () => { state.draft.type="expense"; state.draft.categoryId = state.categories.find(c=>c.type==="expense")?.id || ""; render(); };
  document.getElementById("type-income").onclick = () => { state.draft.type="income"; state.draft.categoryId = state.categories.find(c=>c.type==="income")?.id || ""; render(); };
  document.getElementById("field-amount").oninput = e => state.draft.amount = e.target.value;
  document.getElementById("field-date").onchange = e => state.draft.date = e.target.value;
  document.getElementById("field-memo").oninput = e => state.draft.memo = e.target.value;
  document.querySelectorAll("[data-cat]").forEach(el => { el.onclick = () => { state.draft.categoryId = el.getAttribute("data-cat"); render(); }; });
  const recBtn = document.getElementById("btn-toggle-recurring");
  if (recBtn) recBtn.onclick = () => { state.draft.makeRecurring = !state.draft.makeRecurring; render(); };
  const delBtn = document.getElementById("btn-delete-draft");
  if (delBtn) delBtn.onclick = deleteDraftTxn;
  document.getElementById("btn-save-draft").onclick = saveDraft;
}

/* -------------------------------- init -------------------------------- */
render();
</script>
</body>
</html>
